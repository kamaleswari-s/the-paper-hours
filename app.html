<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>the paper hours</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 60 60'%3E%3Ccircle cx='30' cy='30' r='28' fill='%23FBFCFE' stroke='%231B2A3D' stroke-width='2'/%3E%3Cg transform='rotate(-8 30 30)'%3E%3Cline x1='16' y1='14' x2='44' y2='14' stroke='%232A241C' stroke-width='2.4' stroke-linecap='round'/%3E%3Cline x1='16' y1='46' x2='44' y2='46' stroke='%232A241C' stroke-width='2.4' stroke-linecap='round'/%3E%3Cpath d='M18 14 L42 14 L30 30 Z' fill='%234A6FA5' stroke='%232A241C' stroke-width='2' stroke-linejoin='round'/%3E%3Cpath d='M18 46 L42 46 L30 30 Z' fill='%237C93AC' stroke='%232A241C' stroke-width='2' stroke-linejoin='round'/%3E%3Cpath d='M30 28.3 L31.1 30.4 L33.4 30.4 L31.6 31.9 L32.3 34.1 L30 32.7 L27.7 34.1 L28.4 31.9 L26.6 30.4 L28.9 30.4 Z' fill='%23FBFCFE' stroke='%232A241C' stroke-width='0.8'/%3E%3C/g%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,500;1,600&family=Shadows+Into+Light&family=Caveat:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#E2E8F0; --ink:#1B2A3D; --ink-soft:rgba(27,42,61,0.65);
    --card:#FBFCFE; --card-border:rgba(27,42,61,0.28);
    --accent1:#4A6FA5; --accent2:#7C93AC; --accent3:#A8C4E0; --accent4:#5A5347;
    --shadow:rgba(27,42,61,0.32);
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; min-height:100%; }
  body{
    background: var(--bg); color: var(--ink); font-family:'Inter', sans-serif;
    overflow-x:hidden; transition: background .6s ease, color .6s ease;
  }
  button{ font-family:'Inter'; }

  #starfall{ position:fixed; inset:0; z-index:1; pointer-events:none; overflow:hidden; }
  .fstar{ position:absolute; top:-8%; opacity:0; animation-name: fall; animation-timing-function:linear; animation-iteration-count:infinite; }
  @keyframes fall{
    0%{ transform:translateY(0) translateX(0) rotate(0deg); opacity:0; }
    6%{ opacity: var(--op,0.8); }
    50%{ transform:translateY(55vh) translateX(var(--drift,20px)) rotate(160deg); }
    94%{ opacity: var(--op,0.8); }
    100%{ transform:translateY(112vh) translateX(0) rotate(320deg); opacity:0; }
  }

  header{
    position:relative; z-index:5; display:flex; align-items:center; justify-content:space-between;
    padding: 22px 28px; max-width:920px; margin:0 auto;
  }
  .wordmark{ font-family:'Playfair Display'; font-style:italic; font-weight:600; font-size:19px; color: var(--ink); }
  .theme-toggle{
    background: var(--card); border:1px solid var(--card-border); color:var(--ink);
    width:38px; height:38px; border-radius:50%; cursor:pointer; font-size:16px;
    display:flex; align-items:center; justify-content:center;
    box-shadow: 2px 2px 0 var(--shadow); transition: transform .15s ease;
  }
  .theme-toggle:hover{ transform: translate(-1px,-1px); }
  .theme-toggle:active{ transform: translate(1px,1px); }

  main{ position:relative; z-index:5; max-width:920px; margin:0 auto; padding: 10px 28px 60px; }

  .modes{ display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin: 8px 0 28px; }
  .mode-pill{
    font-weight:600; font-size:12.5px; letter-spacing:0.01em;
    background: transparent; border:1px solid var(--card-border); color:var(--ink);
    padding:7px 14px; border-radius:999px; cursor:pointer; transition: all .2s ease; opacity:0.7;
  }
  .mode-pill:hover{ opacity:1; }
  .mode-pill.active{ background: var(--accent1); border-color:var(--accent1); color: var(--card); opacity:1; }

  .stage-wrap{ display:flex; flex-direction:column; align-items:center; }
  .eyebrow{ font-size:11px; letter-spacing:0.24em; text-transform:uppercase; opacity:0.55; margin:0 0 10px; }

  .stage{ width:min(480px,94vw); position:relative; }

  .card{
    background: var(--card); color: var(--ink); border-radius:12px; padding: 36px 30px 28px;
    box-shadow: 8px 8px 0 var(--shadow); border:1.5px solid var(--card-border);
    position:relative; transition: opacity .4s ease, transform .4s ease;
  }
  .tape{
    position:absolute; top:-10px; left:50%; transform:translateX(-50%) rotate(-2deg);
    width:74px; height:20px; background: var(--accent4); opacity:0.9; border-radius:2px;
    box-shadow: 1px 2px 3px rgba(0,0,0,0.18);
  }
  .card.hidden{ opacity:0; transform: scale(0.92); pointer-events:none; }

  .card h1{
    font-family:'Playfair Display'; font-style:italic; font-weight:600; font-size:21px;
    margin:6px 0 4px; min-height:52px; color:var(--ink);
  }
  .card .accent-line{ font-family:'Shadows Into Light'; font-size:16px; color: var(--accent2); margin:0 0 14px; }

  textarea{
    width:100%; min-height:100px; resize:none; border:none; outline:none; background:transparent;
    font-family:'Caveat'; font-weight:600; font-size:25px; line-height:1.4; color: var(--ink);
  }
  textarea::placeholder{ color: var(--ink-soft); font-family:'Caveat'; font-weight:600; }

  .unlock-row{ display:none; flex-wrap:wrap; gap:8px; margin-top:12px; }
  .unlock-row.active{ display:flex; }
  .unlock-chip{
    font-weight:600; font-size:12px; padding:7px 13px; border-radius:999px; cursor:pointer;
    border:1px solid var(--card-border); background:transparent; color:var(--ink); opacity:0.7;
  }
  .unlock-chip.active{ background:var(--accent1); border-color:var(--accent1); color:var(--card); opacity:1; }
  .unlock-chip:hover{ opacity:1; }
  .unlock-date-group{ display:flex; flex-direction:column; gap:4px; width:100%; margin-top:6px; }
  .unlock-date-label{ font-size:11px; opacity:0.6; letter-spacing:0.02em; }
  .unlock-date{
    font-family:'Inter'; font-size:13px; padding:9px 10px; border-radius:8px;
    border:1.5px solid var(--card-border); background: var(--card); color:var(--ink); width:100%;
  }
  .unlock-date-readout{ font-size:12px; opacity:0.7; font-weight:600; }

  .row{ display:flex; align-items:center; justify-content:space-between; margin-top:14px; gap:12px; }

  .let-go{
    font-weight:700; font-size:14px; letter-spacing:0.02em;
    background: var(--accent1); color: var(--card); border:none; padding:11px 20px; border-radius:8px;
    cursor:pointer; box-shadow: 3px 3px 0 var(--shadow); transition: transform .12s ease, box-shadow .12s ease;
  }
  .let-go:hover{ transform: translate(-2px,-2px); box-shadow: 5px 5px 0 var(--shadow); }
  .let-go:active{ transform: translate(1px,1px); box-shadow: 1px 1px 0 var(--shadow); }
  .let-go:disabled{ opacity:0.4; cursor:default; box-shadow:none; transform:none; }

  .hint{ font-size:11px; color: var(--ink-soft); max-width:150px; text-align:right; line-height:1.4; }

  .foldbox{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity .35s ease; flex-direction:column; gap:14px; }
  .foldbox.active{ opacity:1; pointer-events:auto; }
  .foldbox .shape-holder{ width:140px; height:140px; }
  .foldbox svg{ width:100%; height:100%; filter: drop-shadow(3px 3px 0px var(--shadow)); }
  .fold-snap{ animation: snap .3s ease; }
  @keyframes snap{ 0%{transform:scaleY(1);} 40%{transform:scaleY(0.86) scaleX(1.05);} 100%{transform:scaleY(1);} }

  .choice-bar{ display:none; gap:10px; }
  .choice-bar button{
    font-weight:600; font-size:13px; padding:9px 16px; border-radius:999px; cursor:pointer;
    border:1px solid var(--card-border); background:var(--card); color:var(--ink);
    box-shadow: 2px 2px 0 var(--shadow); transition: transform .12s ease;
  }
  .choice-bar button:hover{ transform: translate(-1px,-1px); }
  .choice-bar button.primary{ background:var(--accent1); color:var(--card); border-color:var(--accent1); }

  .footer{ margin-top:20px; display:flex; flex-direction:column; align-items:center; gap:8px; }
  .counter{ font-weight:500; font-size:12.5px; letter-spacing:0.02em; opacity:0.75; text-align:center; }
  .jar-link{
    background: transparent; border:1px solid var(--card-border); color: var(--ink);
    font-weight:600; font-size:12.5px; padding:8px 16px; border-radius:999px; cursor:pointer;
  }
  .jar-link:hover{ background: var(--card); }

  .toast{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(16px);
    background: var(--ink); color: var(--bg); font-size:13px; font-weight:500;
    padding:10px 18px; border-radius:10px; opacity:0; pointer-events:none;
    transition: opacity .3s ease, transform .3s ease; z-index:30; max-width:320px; text-align:center;
  }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  .page-view{ position:fixed; inset:0; background:var(--bg); z-index:100; display:none; overflow-y:auto; }
  .page-view.active{ display:block; }
  .page-view-inner{ max-width:760px; margin:0 auto; padding:40px 24px 80px; }
  .back-btn{
    background:none; border:none; color:var(--ink); font-size:13px; font-weight:600; cursor:pointer;
    margin-bottom:18px; opacity:0.75;
  }
  .back-btn:hover{ opacity:1; }
  .page-view h2{ font-family:'Playfair Display'; font-style:italic; font-weight:600; font-size:26px; margin:0 0 6px; text-align:center; }
  .page-sub{ text-align:center; font-family:'Shadows Into Light'; font-size:15px; opacity:0.7; margin:0 0 24px; }

  .filters{ display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-bottom:24px; }
  .filter-chip{
    font-weight:600; font-size:12px; padding:7px 14px; border-radius:999px; cursor:pointer;
    border:1px solid var(--card-border); background:transparent; color:var(--ink); opacity:0.65;
  }
  .filter-chip.active{ background:var(--accent1); border-color:var(--accent1); color:var(--card); opacity:1; }

  .book-actions{ display:flex; gap:10px; justify-content:center; margin-bottom:26px; }
  .book-actions button{
    font-weight:600; font-size:13px; padding:10px 18px; border-radius:8px; cursor:pointer;
    border:1px solid var(--card-border); background:var(--card); color:var(--ink);
    box-shadow: 3px 3px 0 var(--shadow); transition: transform .12s ease;
  }
  .book-actions button:hover{ transform: translate(-2px,-2px); }

  .page-grid{ display:grid; grid-template-columns:repeat(auto-fit, minmax(220px,1fr)); gap:16px; }
  .note-card{
    background:var(--card); border:1px solid var(--card-border); border-radius:10px; padding:18px;
    box-shadow:4px 4px 0 var(--shadow); text-align:left;
  }
  .note-shape{ width:52px; height:40px; margin-bottom:10px; }
  .note-shape svg{ width:100%; height:100%; }
  .note-cat{ font-size:10px; letter-spacing:0.1em; text-transform:uppercase; opacity:0.5; margin:0 0 6px; }
  .note-flower-name{ font-family:'Playfair Display'; font-style:italic; font-weight:600; font-size:15px; margin:0; }
  .note-flower-meaning{ font-family:'Shadows Into Light'; font-size:13px; opacity:0.75; margin:0 0 6px; }
  .note-text{ font-family:'Playfair Display'; font-style:italic; font-size:14.5px; margin:0 0 8px; line-height:1.5; }
  .note-date{ font-size:11px; opacity:0.55; margin:0; }
  .empty-note{ opacity:0.6; font-size:13.5px; text-align:center; grid-column:1/-1; }

  .reveal-card{ display:none; flex-direction:column; align-items:center; gap:12px; }
  .reveal-shape{ width:150px; height:115px; }
  .reveal-shape svg{ width:100%; height:100%; filter: drop-shadow(3px 3px 0px var(--shadow)); }
  .reveal-flower-name{ font-family:'Playfair Display'; font-style:italic; font-weight:600; font-size:16px; margin:0; }
  .reveal-flower-meaning{ font-family:'Shadows Into Light'; font-size:14px; opacity:0.75; margin:0 0 4px; }
  .reveal-text{
    font-family:'Playfair Display'; font-style:italic; font-size:19px; max-width:480px;
    background:var(--card); border:1px solid var(--card-border); border-radius:12px; padding:22px 26px;
    box-shadow:4px 4px 0 var(--shadow); line-height:1.5; text-align:center;
  }
  .reveal-date{ font-size:12px; opacity:0.6; }
  .reveal-actions{ display:flex; gap:10px; margin-top:8px; }
  .reveal-actions button{
    font-weight:600; font-size:13px; padding:9px 16px; border-radius:999px; cursor:pointer;
    border:1px solid var(--card-border); background:var(--card); color:var(--ink);
  }

  .lantern-grid{ display:flex; flex-wrap:wrap; gap:20px; justify-content:center; }
  .lantern-item{ display:flex; flex-direction:column; align-items:center; gap:8px; cursor:pointer; width:80px; }
  .lantern-item .shape-wrap{ width:60px; height:82px; transition: filter .3s ease; }
  .lantern-item .shape-wrap svg{ width:100%; height:100%; }
  .lantern-label{ font-size:10.5px; text-align:center; opacity:0.65; line-height:1.3; }

  .daily-quote{
    text-align:center; font-family:'Shadows Into Light'; font-size:16px; opacity:0.78;
    max-width:520px; margin:0 auto 16px; line-height:1.5; padding:0 10px;
  }

  .on-this-day{ margin-bottom:26px; padding:18px 16px; border:1.5px dashed var(--accent1); border-radius:12px; }
  .on-this-day-title{ font-family:'Shadows Into Light'; font-size:16px; margin:0 0 12px; color:var(--accent1); text-align:center; }

  html, body{ cursor: var(--app-cursor, auto); }

  @media (max-width: 640px){
    header{ padding:16px 16px; }
    .wordmark{ font-size:16px; }
    main{ padding:6px 16px 50px; }
    .card{ padding:26px 20px 22px; }
    .card h1{ font-size:18px; min-height:auto; }
    textarea{ font-size:22px; }
    .let-go{ padding:10px 16px; font-size:13px; }
    .hint{ max-width:110px; font-size:10px; }
    .daily-quote{ font-size:14px; margin-bottom:12px; }
    .mode-pill{ padding:8px 13px; font-size:12px; }
    .page-view-inner{ padding:26px 16px 60px; }
    .page-view h2{ font-size:21px; }
    .letter{ padding:28px 22px; }
    .letter p{ font-size:15.5px; }
    .letter p.first-line{ font-size:17px; }
    .cta{ padding:14px 22px; font-size:14px; width:100%; text-align:center; }
    .page-grid{ grid-template-columns: 1fr; }
    .lantern-grid{ gap:14px; }
    .theme-toggle{ width:40px; height:40px; }
  }
</style>
</head>
<body>

<div id="starfall"></div>

<header>
  <a href="index.html" style="text-decoration:none;">
    <span class="wordmark">the paper hours</span>
  </a>
  <div style="display:flex; gap:8px; align-items:center;">
    <button class="theme-toggle" id="mailBtn" aria-label="sign in with email" title="sign in with email" style="font-size:15px;">✉</button>
    <button class="theme-toggle" id="themeToggle" aria-label="switch theme">☀</button>
  </div>
</header>

<main>
  <div class="stage-wrap">
    <p class="daily-quote" id="dailyQuote"></p>
    <div class="modes" id="modes"></div>
    <p class="eyebrow" id="eyebrow"></p>

    <div class="stage">
      <div class="card" id="card">
        <div class="tape"></div>
        <h1 id="cardTitle"></h1>
        <p class="accent-line" id="accentLine"></p>
        <textarea id="message" placeholder=""></textarea>
        <div class="unlock-row" id="unlockRow">
          <button class="unlock-chip" data-days="7">1 week</button>
          <button class="unlock-chip" data-days="30">1 month</button>
          <button class="unlock-chip" data-days="182">6 months</button>
          <button class="unlock-chip" data-days="365">1 year</button>
          <div class="unlock-date-group">
            <span class="unlock-date-label">or pick an exact date</span>
            <input type="date" class="unlock-date" id="unlockDate">
            <span class="unlock-date-readout" id="unlockDateReadout"></span>
          </div>
        </div>
        <div class="row">
          <button class="let-go" id="letGoBtn"></button>
          <div class="hint" id="hint"></div>
        </div>
      </div>
      <div class="foldbox" id="foldbox">
        <div class="shape-holder" id="shapeHolder"></div>
        <div class="choice-bar" id="choiceBar">
          <button id="choiceKeep">keep it</button>
          <button class="primary" id="choiceRelease">let it fly</button>
        </div>
      </div>
    </div>

    <div class="footer">
      <div class="counter" id="counter"></div>
      <button class="jar-link" id="jarBtn" style="display:none;"></button>
    </div>
  </div>
</main>

<div id="bookView" class="page-view">
  <div class="page-view-inner">
    <button class="back-btn" id="bookBack">← back</button>
    <svg viewBox="0 0 160 100" style="width:120px; height:75px; display:block; margin:0 auto 10px;">
      <path d="M80,18 Q26,7 14,20 L14,82 Q26,73 80,86 Z" fill="var(--card)" stroke="var(--card-border)" stroke-width="2"/>
      <path d="M80,18 Q134,7 146,20 L146,82 Q134,73 80,86 Z" fill="var(--card)" stroke="var(--card-border)" stroke-width="2"/>
      <line x1="80" y1="18" x2="80" y2="86" stroke="var(--accent1)" stroke-width="2.5"/>
      <line x1="26" y1="34" x2="66" y2="38" stroke="var(--card-border)" stroke-width="1.4"/>
      <line x1="26" y1="46" x2="62" y2="50" stroke="var(--card-border)" stroke-width="1.4"/>
      <line x1="26" y1="58" x2="58" y2="61" stroke="var(--card-border)" stroke-width="1.4"/>
      <line x1="94" y1="38" x2="134" y2="34" stroke="var(--card-border)" stroke-width="1.4"/>
      <line x1="98" y1="50" x2="134" y2="46" stroke="var(--card-border)" stroke-width="1.4"/>
      <line x1="102" y1="61" x2="134" y2="58" stroke="var(--card-border)" stroke-width="1.4"/>
    </svg>
    <h2>the book</h2>
    <p class="page-sub">everything you've kept, newest first</p>
    <div class="filters" id="bookFilters"></div>
    <div class="book-actions">
      <button id="bookRandomBtn">flip to a random page</button>
      <button id="bookAllBtn">read them all</button>
    </div>
    <div id="onThisDay"></div>
    <div class="page-grid" id="bookGrid"></div>
    <div class="reveal-card" id="bookReveal"></div>
  </div>
</div>

<div id="lanternView" class="page-view">
  <div class="page-view-inner">
    <button class="back-btn" id="lanternBack">← back</button>
    <h2>the safe</h2>
    <p class="page-sub">locked until their date arrives</p>
    <div class="lantern-grid" id="lanternGrid"></div>
    <div class="reveal-card" id="lanternReveal"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  const STORE_KEY = 'paper_hours_v5';
  function loadState(){ try{ const r=localStorage.getItem(STORE_KEY); return r?JSON.parse(r):{}; }catch(e){ return window.__mem||{}; } }
  function saveState(s){ try{ localStorage.setItem(STORE_KEY, JSON.stringify(s)); }catch(e){ window.__mem=s; } }
  let state = Object.assign({
    book:[], lanterns:[], releasedCount:0, themReleased:0, themeIndex:0
  }, loadState());
  if(typeof state.themeIndex !== 'number') state.themeIndex = 0;

  const THEME_LIST = [
    { name:'Denim', dark:false, bg:'#E2E8F0', ink:'#1B2A3D', card:'#FBFCFE', accents:['#4A6FA5','#7C93AC','#A8C4E0','#5A5347'] },
    { name:'Berry Field', dark:false, bg:'#F7E8E6', ink:'#3A1418', card:'#FFF8F7', accents:['#A8283F','#C97086','#5C1A2E','#8C1F35'] },
    { name:'Olive Grove', dark:false, bg:'#EAEBD9', ink:'#2B2E1E', card:'#FAFBF0', accents:['#6B7A3E','#4E5C2E','#A69A5E','#2E3D22'] },
    { name:'Charcoal & Citrine', dark:false, bg:'#E7E7E5', ink:'#232323', card:'#FAFAF8', accents:['#D9B23E','#B8923E','#6E5E4E','#3A4550'] },
    { name:'Lilac Fields', dark:false, bg:'#E8E6F2', ink:'#241D3A', card:'#FAF9FE', accents:['#5C5A8C','#6A6FBE','#B8B4E0','#3A3560'] },
    { name:'Huckleberry Night', dark:true, bg:'#382C42', ink:'#F2E9DC', card:'#5C4A6C', accents:['#E3BE66','#EBA9C2','#93B382','#8B7A9C'] },
    { name:'Midnight Teal', dark:true, bg:'#16323A', ink:'#EAF3F0', card:'#234A54', accents:['#E2876B','#D9B25E','#A599C7','#7FC2A4'] },
    { name:'Ink Violet', dark:true, bg:'#241B3D', ink:'#EDE6F5', card:'#392A54', accents:['#E28CA8','#6FC2A0','#E3A94E','#7CA8D8'] },
    { name:'Forest Dusk', dark:true, bg:'#1E2E22', ink:'#EAF0E4', card:'#2C4232', accents:['#E7A9BE','#D4A65E','#8CB4CE','#C97B92'] },
    { name:'Charcoal Berry', dark:true, bg:'#241F26', ink:'#F0E9E2', card:'#362F38', accents:['#C24C74','#8FAE7E','#E3C06C','#7C9BBE'] }
  ];
  const SHAPE_COLORS = ['#E8846B','#3D8C87','#E3BE66','#9A8FC2','#7FA8D8','#E27F98','#8FAE7E','#D9A574','#B26AA0','#6FB5A8','#C97B4A','#5C8AA6'];
  const FLOWERS = [
    { name:'Violet', meaning:"for the quiet, steady kind of good", color:'#9A8FC2', center:'#E3BE66', type:'simple', petals:5 },

  function quoteForToday(){

    let hash = 0;
    for(let i=0;i<day.length;i++){ hash = (hash*31 + day.charCodeAt(i)) >>> 0; }
    return QUOTES[hash % QUOTES.length];
  }

  function rand(a,b){ return Math.random()*(b-a)+a; }
  function seedRand(n){ const x=Math.sin(n*999.7)*10000; return x-Math.floor(x); }
  function showToast(msg,ms){ toast.textContent=msg; toast.classList.add('show'); clearTimeout(showToast._t); showToast._t=setTimeout(()=>toast.classList.remove('show'), ms||3000); }
  function themeColors(){ return (THEME_LIST[state.themeIndex]||THEME_LIST[0]).accents; }
  function escapeHtml(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function formatDDMMYY(dateStr){
    if(!dateStr) return '';
    const [y,m,d] = dateStr.split('-');
    return `${d}-${m}-${y.slice(2)}`;
  }
  function randomShapeColor(){ return SHAPE_COLORS[Math.floor(Math.random()*SHAPE_COLORS.length)]; }

  function hexToRgba(hex, alpha){ const f=parseInt(hex.slice(1),16); return `rgba(${f>>16},${(f>>8)&0xFF},${f&0xFF},${alpha})`; }
  function shade(hex, percent){
    let f=parseInt(hex.slice(1),16), t=percent<0?0:255, p=percent<0?percent*-1:percent;
    let R=f>>16, G=f>>8&0x00FF, B=f&0x0000FF;
    return "#"+(0x1000000+(Math.round((t-R)*p)+R)*0x10000+(Math.round((t-G)*p)+G)*0x100+(Math.round((t-B)*p)+B)).toString(16).slice(1);
  }

  const INK_BOLD = 'rgba(15,10,8,0.88)';
  const INK_MED = 'rgba(15,10,8,0.5)';

  function starGlyphSVG(color){
    return `<svg viewBox="0 0 100 100"><path d="M50 6 L61 39 L96 39 L67 59 L78 92 L50 71 L22 92 L33 59 L4 39 L39 39 Z" fill="${color}" stroke="${INK_BOLD}" stroke-width="2.8" stroke-linejoin="round"/></svg>`;
  }
  function planeSVG(color){
    return `<svg viewBox="0 0 120 80"><path d="M116 40 L4 6 L50 40 L4 74 Z" fill="${color}" stroke="${INK_BOLD}" stroke-width="2.6" stroke-linejoin="round"/><line x1="116" y1="40" x2="50" y2="40" stroke="${INK_MED}" stroke-width="1.8"/></svg>`;
  }
  let gradCounter = 0;
  function uid(){ return 'fg'+(gradCounter++); }
  function watercolorGradDefs(color){
    const light = shade(color, 0.42), dark = shade(color, -0.18);
    const id = uid();
    const cx = (0.25 + Math.random()*0.35).toFixed(2);
    const cy = (0.15 + Math.random()*0.3).toFixed(2);
    return { id, defs:`<radialGradient id="${id}" cx="${cx}" cy="${cy}" r="0.9"><stop offset="0%" stop-color="${light}"/><stop offset="55%" stop-color="${color}"/><stop offset="100%" stop-color="${dark}"/></radialGradient>` };
  }
  function simpleBloomSVG(color, center, petalCount){
    const petalD = "M50 50 C42 40 42 18 50 8 C58 18 58 40 50 50 Z";
    let petals='', defs='';
    for(let i=0;i<petalCount;i++){
      const a=(360/petalCount)*i;
      const g = watercolorGradDefs(color);
      defs += g.defs;
      petals += `<path d="${petalD}" fill="url(#${g.id})" stroke="${INK_MED}" stroke-width="1.6" stroke-linejoin="round" transform="rotate(${a} 50 50)"/>`;
    }
    const cg = watercolorGradDefs(center);
    return `<svg viewBox="0 0 100 100"><defs>${defs}${cg.defs}</defs>${petals}<circle cx="50" cy="50" r="9" fill="url(#${cg.id})" stroke="${INK_MED}" stroke-width="1.4"/></svg>`;
  }
  function layeredBloomSVG(color, center){
    const inner = shade(color, 0.22);
    const outerPetal = "M50 50 C36 44 32 26 44 14 C50 9 50 9 56 14 C68 26 64 44 50 50 Z";
    const innerPetal = "M50 50 C42 46 40 34 47 26 C50 23 50 23 53 26 C60 34 58 46 50 50 Z";
    let petals='', defs='';
    for(let i=0;i<8;i++){
      const a=(360/8)*i; const g=watercolorGradDefs(color); defs+=g.defs;
      petals+=`<path d="${outerPetal}" fill="url(#${g.id})" stroke="${INK_MED}" stroke-width="1.4" stroke-linejoin="round" transform="rotate(${a} 50 50)"/>`;
    }
    for(let i=0;i<6;i++){
      const a=(360/6)*i+18; const g=watercolorGradDefs(inner); defs+=g.defs;
      petals+=`<path d="${innerPetal}" fill="url(#${g.id})" stroke="${INK_MED}" stroke-width="1.2" stroke-linejoin="round" transform="rotate(${a} 50 50)"/>`;
    }
    const cg = watercolorGradDefs(center);
    return `<svg viewBox="0 0 100 100"><defs>${defs}${cg.defs}</defs>${petals}<circle cx="50" cy="50" r="7" fill="url(#${cg.id})" stroke="${INK_MED}" stroke-width="1.2"/></svg>`;
  }
  function flowerSVG(f){
    if(f.type==='layered') return layeredBloomSVG(f.color, f.center);
    return simpleBloomSVG(f.color, f.center, f.petals);
  }
  function lanternSVG(color, lit){
    const op = lit ? 1 : 0.5;
    const lockHardware = lit ? '' : `
      <rect x="31" y="60" width="28" height="24" rx="3" fill="#9a8a70" stroke="${INK_BOLD}" stroke-width="1.8"/>
      <path d="M37 60 L37 52 A8 8 0 0 1 53 52 L53 60" fill="none" stroke="${INK_BOLD}" stroke-width="2"/>
      <circle cx="45" cy="70" r="3.4" fill="none" stroke="${INK_BOLD}" stroke-width="1.6"/>
      <line x1="45" y1="73" x2="45" y2="77" stroke="${INK_BOLD}" stroke-width="1.8" stroke-linecap="round"/>`;
    return `<svg viewBox="0 0 90 100">
      <rect x="10" y="24" width="70" height="50" rx="3" fill="${color}" opacity="${op}" stroke="${INK_BOLD}" stroke-width="2.4"/>
      <path d="M10 24 L45 52 L80 24" fill="none" stroke="${INK_MED}" stroke-width="1.6"/>
      ${lockHardware}
    </svg>`;
  }
  function shapeSVG(fold, color){
    if(fold==='star') return starGlyphSVG(color);
    if(fold==='plane') return planeSVG(color);
    if(fold==='lantern') return lanternSVG(color, true);
    return starGlyphSVG(color);
  }
  function frameSquare(c){ return `<svg viewBox="0 0 100 100"><rect x="14" y="14" width="72" height="72" fill="${c}" stroke="${INK_MED}" stroke-width="1.4"/><line x1="14" y1="14" x2="86" y2="86" stroke="${INK_MED}" stroke-width="1.2"/><line x1="86" y1="14" x2="14" y2="86" stroke="${INK_MED}" stroke-width="1.2"/></svg>`; }
  function frameTriangle(c){ return `<svg viewBox="0 0 100 100"><polygon points="14,14 86,14 14,86" fill="${c}" stroke="${INK_MED}" stroke-width="1.2"/></svg>`; }
  function frameKite(c){ return `<svg viewBox="0 0 100 100"><polygon points="50,10 78,50 50,90 22,50" fill="${c}" stroke="${INK_MED}" stroke-width="1.2"/></svg>`; }

  let starEls = [];
  function makeFallingStars(){
    const layer = document.getElementById('starfall');
    layer.innerHTML=''; starEls=[];
    const colors = themeColors();
    const count = 34;
    for(let i=0;i<count;i++){
      const el=document.createElement('div'); el.className='fstar';
      const size=rand(10,24);
      const col = (i / count) * 100;
      const left = Math.max(0, Math.min(96, col + rand(-3.5,3.5)));
      const dur=rand(18,38), delay=-rand(0,dur), drift=rand(-50,50), op=rand(0.55,0.95);
      el.style.left=left+'%'; el.style.width=size+'px'; el.style.height=size+'px';
      el.style.animationDuration=dur+'s'; el.style.animationDelay=delay+'s';
      el.style.setProperty('--drift', drift+'px'); el.style.setProperty('--op', op);
      const color = colors[i%colors.length];
      el.innerHTML = starGlyphSVG(color);
      el.dataset.colorIndex = i%colors.length;
      layer.appendChild(el); starEls.push(el);
    }
  }
  function recolorFallingStars(){
    const colors = themeColors();
    starEls.forEach(el=>{ const idx=parseInt(el.dataset.colorIndex,10); el.innerHTML = starGlyphSVG(colors[idx%colors.length]); });
  }

  function applyMode(key){
    const m = MODES[key]; current = key;
    eyebrowEl.textContent = m.eyebrow;
    cardTitle.textContent = m.title;

      jarBtn.textContent = 'the book · '+state.book.length+' →';

  function updateCounter(){

    else if(current==='them') counterEl.textContent = state.book.filter(x=>x.category==='them').length+' kept · '+(state.themReleased||0)+' let fly';
    else if(current==='wish') counterEl.textContent = state.book.filter(x=>x.category==='wish').length+' of 1,000 wishes folded';
    else if(current==='tinyWin') counterEl.textContent = state.book.filter(x=>x.category==='tinywin').length+' tiny wins kept';

  function playFold(modeKey, text){
    const m = MODES[modeKey];
    if(m.fold==='flower'){ playBloom(modeKey, text); return; }

    const col = randomShapeColor();
    const seq = [frameSquare(col), frameTriangle(col), frameKite(col), shapeSVG(m.fold, col)];

    shapeHolder.innerHTML = seq[0];
    foldbox.classList.add('active');
    card.classList.add('hidden');
    let i=0;
    const step = ()=>{
      i++;
      if(i>=seq.length){
        setTimeout(()=>{
          if(m.action==='choice'){ choiceBar.style.display='flex'; }
          else { resolveFold(modeKey, col, text); }
        }, 250);
        return;
      }
      const wrap = shapeHolder.firstElementChild;
      if(wrap) wrap.classList.add('fold-snap');
      setTimeout(()=>{ shapeHolder.innerHTML = seq[i]; step(); }, 300);
    };
    setTimeout(step, 250);

    choiceBar.querySelector('#choiceKeep') && (choiceBar.querySelector('#choiceKeep').onclick = ()=>{
      choiceBar.style.display='none';
      storeItem(modeKey, col, text);
    });
    choiceBar.querySelector('#choiceRelease') && (choiceBar.querySelector('#choiceRelease').onclick = ()=>{
      choiceBar.style.display='none';
      releaseItem(modeKey, col);
    });
  }

  function playBloom(modeKey, text){
    const f = randomFlower();
    foldbox.classList.add('active');
    card.classList.add('hidden');
    shapeHolder.style.transform='scale(0.2)';
    shapeHolder.style.opacity='0.5';
    shapeHolder.innerHTML = flowerSVG(f);
    requestAnimationFrame(()=>{
      shapeHolder.style.transition='transform .7s cubic-bezier(.34,1.4,.5,1), opacity .5s ease';
      shapeHolder.style.transform='scale(1)';
      shapeHolder.style.opacity='1';
    });
    setTimeout(()=>{
      shapeHolder.style.cssText='';
      storeFlower(modeKey, f, text);
    }, 760);
  }

  function resetStage(){
    foldbox.classList.remove('active');
    card.classList.remove('hidden');
    shapeHolder.style.cssText='';
    textarea.value='';
    letGoBtn.disabled=false;
    Array.from(modesEl.children).forEach(b=>b.style.pointerEvents='auto');
    updateCounter();
    if(MODES[current].action==='lantern'){ jarBtn.textContent = 'the safe · '+state.lanterns.length+' →'; }
    else if(MODES[current].bookCategory){ jarBtn.textContent = 'the book · '+state.book.length+' →'; }
  }

  function resolveFold(modeKey, col, text){
    const m = MODES[modeKey];
    if(m.action==='release') releaseItem(modeKey, col);
    else if(m.action==='store') storeItem(modeKey, col, text);
    else if(m.action==='lantern') sealLantern(modeKey, col, text);
  }

  function releaseItem(modeKey, col){
    const m = MODES[modeKey];
    if(m.fold==='plane'){ releasePlane(modeKey, col); return; }
    const rect = document.querySelector('.stage').getBoundingClientRect();
    const cx=rect.left+rect.width/2, cy=rect.top+rect.height/2;
    const w=56,h=56;
    const clone=document.createElement('div');
    clone.style.position='fixed'; clone.style.left=(cx-w/2)+'px'; clone.style.top=(cy-h/2)+'px';
    clone.style.width=w+'px'; clone.style.height=h+'px'; clone.style.zIndex='60';
    clone.style.transition='transform 1.3s cubic-bezier(.3,0,.2,1), opacity 1.3s ease';
    clone.innerHTML = shapeSVG(m.fold, col);
    document.body.appendChild(clone);
    const tx=rand(-80,80), ty=-(cy*0.85);
    requestAnimationFrame(()=>{ clone.style.transform=`translate(${tx}px, ${ty}px) scale(0.55)`; });
    setTimeout(()=>{
      clone.style.transition='transform .4s ease, opacity .4s ease, filter .4s ease';
      clone.style.transform += ' scale(1.7)';
      clone.style.filter='brightness(1.9) drop-shadow(0 0 16px rgba(255,255,255,0.95))';
      setTimeout(()=>{
        clone.style.opacity='0';
        setTimeout(()=>{
          clone.remove();
          state.releasedCount=(state.releasedCount||0)+1;
          showToast('it shone once, then let go.',2800);
          saveState(state); resetStage();
        }, 420);
      }, 380);
    }, 1300);
  }

  function releasePlane(modeKey, col){
    const rect = document.querySelector('.stage').getBoundingClientRect();
    const cx=rect.left+rect.width/2, cy=rect.top+rect.height/2;
    const w=64,h=42;
    const clone=document.createElement('div');
    clone.style.position='fixed'; clone.style.left=(cx-w/2)+'px'; clone.style.top=(cy-h/2)+'px';
    clone.style.width=w+'px'; clone.style.height=h+'px'; clone.style.zIndex='60';
    clone.innerHTML = shapeSVG('plane', col);
    document.body.appendChild(clone);
    const angle = rand(-14,-4);
    const rad = angle*Math.PI/180;
    const dist = Math.max(window.innerWidth, window.innerHeight) * 1.15;
    const tx = Math.cos(rad)*dist, ty = Math.sin(rad)*dist;
    const duration = 680;
    clone.style.transform = `translate(0px,0px) rotate(${angle}deg) scale(1)`;
    clone.style.transition = `transform ${duration}ms cubic-bezier(.7,0,.9,.25), opacity 240ms ease ${duration-200}ms`;

    const trailTimer = setInterval(()=>{
      const r = clone.getBoundingClientRect();
      const dot = document.createElement('div');
      dot.style.position='fixed';
      dot.style.left = (r.left + r.width*0.15 - 3)+'px';
      dot.style.top = (r.top + r.height/2 - 3)+'px';
      dot.style.width='6px'; dot.style.height='6px'; dot.style.borderRadius='50%';
      dot.style.background = col; dot.style.zIndex='59'; dot.style.opacity='0.85';
      dot.style.boxShadow = '2px 2px 0 rgba(0,0,0,0.15)';
      dot.style.transition = 'opacity .45s ease, transform .45s ease';
      document.body.appendChild(dot);
      requestAnimationFrame(()=>{ dot.style.opacity='0'; dot.style.transform='scale(0.3)'; });
      setTimeout(()=> dot.remove(), 480);
    }, 40);

    requestAnimationFrame(()=>{
      clone.style.transform = `translate(${tx}px, ${ty}px) rotate(${angle}deg) scale(0.4)`;
      clone.style.opacity = '0';
    });
    setTimeout(()=>{
      clearInterval(trailTimer);
      clone.remove();
      state.themReleased=(state.themReleased||0)+1;
      showToast("it's gone to them now. it won't come back.",2800);
      saveState(state); resetStage();
    }, duration+160);
  }

  function storeItem(modeKey, col, text){
    const m = MODES[modeKey];
    const rect = document.querySelector('.stage').getBoundingClientRect();
    const cx=rect.left+rect.width/2, cy=rect.top+rect.height/2;
    const jr = jarBtn.getBoundingClientRect();
    const tx=(jr.left+jr.width/2)-cx, ty=(jr.top+jr.height/2)-cy;
    const w=52, h=m.fold==='plane'?35:39;
    const clone=document.createElement('div');
    clone.style.position='fixed'; clone.style.left=(cx-w/2)+'px'; clone.style.top=(cy-h/2)+'px';
    clone.style.width=w+'px'; clone.style.height=h+'px'; clone.style.zIndex='60';
    clone.style.transition='transform 1s cubic-bezier(.4,0,.2,1), opacity 1s ease';
    clone.innerHTML = shapeSVG(m.fold, col);
    document.body.appendChild(clone);
    requestAnimationFrame(()=>{ clone.style.transform=`translate(${tx}px, ${ty}px) scale(0.3)`; clone.style.opacity='0.9'; });
    setTimeout(()=>{
      clone.remove();
      state.book.push({ t:Date.now(), text: text, color: col, category: m.bookCategory });
      saveState(state);
      showToast('safe in the book now.',2400);
      resetStage();
    }, 950);
  }

  function storeFlower(modeKey, f, text){
    const m = MODES[modeKey];
    const rect = document.querySelector('.stage').getBoundingClientRect();
    const cx=rect.left+rect.width/2, cy=rect.top+rect.height/2;
    const jr = jarBtn.getBoundingClientRect();
    const tx=(jr.left+jr.width/2)-cx, ty=(jr.top+jr.height/2)-cy;
    const w=50,h=50;
    const clone=document.createElement('div');
    clone.style.position='fixed'; clone.style.left=(cx-w/2)+'px'; clone.style.top=(cy-h/2)+'px';
    clone.style.width=w+'px'; clone.style.height=h+'px'; clone.style.zIndex='60';
    clone.style.transition='transform 1s cubic-bezier(.4,0,.2,1), opacity 1s ease';
    clone.innerHTML = flowerSVG(f);
    document.body.appendChild(clone);
    requestAnimationFrame(()=>{ clone.style.transform=`translate(${tx}px, ${ty}px) scale(0.35)`; clone.style.opacity='0.9'; });
    setTimeout(()=>{
      clone.remove();
      state.book.push({ t:Date.now(), text: text, flowerName: f.name, category:'tinywin' });
      saveState(state);
      showToast(f.name+' bloomed — safe in the book.',2600);
      resetStage();
    }, 950);
  }

  function sealLantern(modeKey, col, text){
    const rect = document.querySelector('.stage').getBoundingClientRect();
    const cx=rect.left+rect.width/2, cy=rect.top+rect.height/2;
    const jr = jarBtn.getBoundingClientRect();
    const tx=(jr.left+jr.width/2)-cx, ty=(jr.top+jr.height/2)-cy;
    const w=40,h=55;
    const clone=document.createElement('div');
    clone.style.position='fixed'; clone.style.left=(cx-w/2)+'px'; clone.style.top=(cy-h/2)+'px';
    clone.style.width=w+'px'; clone.style.height=h+'px'; clone.style.zIndex='60';
    clone.style.transition='transform 1s cubic-bezier(.4,0,.2,1), opacity 1s ease';
    clone.innerHTML = lanternSVG(col, true);
    document.body.appendChild(clone);
    requestAnimationFrame(()=>{ clone.style.transform=`translate(${tx}px, ${ty}px) scale(0.4)`; clone.style.opacity='0.85'; });
    let unlockAt;
    if(unlockDateInput.value){ unlockAt = new Date(unlockDateInput.value+'T00:00:00').getTime(); }
    else if(selectedUnlockDays){ unlockAt = Date.now() + selectedUnlockDays*86400000; }
    else { unlockAt = Date.now(); }
    setTimeout(()=>{
      clone.remove();
      state.lanterns.push({ t:Date.now(), text: text, color: col, unlockAt: unlockAt, opened:false });
      saveState(state);
      const msg = unlockAt <= Date.now() ? "no lock this time, it's already waiting for you in the safe." : 'locked away until '+new Date(unlockAt).toLocaleDateString()+'.';
      showToast(msg,2800);
      selectedUnlockDays = null;
      Array.from(document.querySelectorAll('.unlock-chip')).forEach(c=>c.classList.remove('active'));
      unlockDateInput.value='';
      resetStage();
    }, 950);
  }

  function letGo(){
    const text = textarea.value.trim();
    if(!text){
      card.style.transition='transform .08s ease';
      card.style.transform='translateX(-6px)';
      setTimeout(()=>{ card.style.transform='translateX(6px)'; },90);
      setTimeout(()=>{ card.style.transform=''; card.style.transition='transform .4s ease'; },180);
      return;
    }
    letGoBtn.disabled=true;
    Array.from(modesEl.children).forEach(b=>b.style.pointerEvents='none');
    playFold(current, text);
  }
  letGoBtn.addEventListener('click', letGo);
  textarea.addEventListener('keydown', e=>{ if((e.metaKey||e.ctrlKey)&&e.key==='Enter') letGo(); });

  jarBtn.addEventListener('click', ()=>{
    if(jarBtn.dataset.target==='lanterns') openLanterns();
    else openBook();
  });

  const bookView = document.getElementById('bookView');
  const bookFilters = document.getElementById('bookFilters');
  const bookGrid = document.getElementById('bookGrid');
  const bookReveal = document.getElementById('bookReveal');
  let bookFilter = 'all';
  const CAT_LABELS = { wish:'wish', tinywin:'tiny win', them:'kept' };

  function buildBookFilters(){
    const cats = ['all','wish','tinywin','them'];
    bookFilters.innerHTML = cats.map(c=>`<button class="filter-chip${c===bookFilter?' active':''}" data-cat="${c}">${c==='all'?'all':CAT_LABELS[c]}</button>`).join('');
    Array.from(bookFilters.children).forEach(chip=>{
      chip.addEventListener('click', ()=>{ bookFilter = chip.dataset.cat; buildBookFilters(); renderBookGrid(); });
    });
  }
  function itemShape(item){
    if(item.category==='tinywin'){ const f = FLOWERS.find(x=>x.name===item.flowerName)||FLOWERS[0]; return flowerSVG(f); }
    if(item.category==='them') return planeSVG(item.color);
    return starGlyphSVG(item.color);
  }
  function itemMeta(item){
    if(item.category==='tinywin'){
      const f = FLOWERS.find(x=>x.name===item.flowerName)||FLOWERS[0];
      return `<p class="note-flower-name">${escapeHtml(f.name)}</p><p class="note-flower-meaning">${escapeHtml(f.meaning)}</p>`;
    }
    return '';
  }
  function itemMetaReveal(item){
    if(item.category==='tinywin'){
      const f = FLOWERS.find(x=>x.name===item.flowerName)||FLOWERS[0];
      return `<p class="reveal-flower-name">${escapeHtml(f.name)}</p><p class="reveal-flower-meaning">${escapeHtml(f.meaning)}</p>`;
    }
    return '';
  }
  function filteredBook(){
    if(bookFilter==='all') return state.book;
    return state.book.filter(x=>x.category===bookFilter);
  }
  function renderBookGrid(){
    bookReveal.style.display='none';
    bookGrid.style.display='grid';
    const items = filteredBook().slice().reverse();
    if(!items.length){ bookGrid.innerHTML = '<p class="empty-note">nothing here yet.</p>'; return; }
    bookGrid.innerHTML = items.map(item=>`
      <div class="note-card">
        <div class="note-shape">${itemShape(item)}</div>
        <p class="note-cat">${CAT_LABELS[item.category]||item.category}</p>
        ${itemMeta(item)}
        <p class="note-text">${escapeHtml(item.text)}</p>
        <p class="note-date">${new Date(item.t).toLocaleDateString()}</p>
      </div>`).join('');
  }
  function bookRandom(){
    const items = filteredBook();
    if(!items.length){ showToast('nothing here yet.',2200); return; }
    const item = items[Math.floor(Math.random()*items.length)];
    bookGrid.style.display='none';
    bookReveal.style.display='flex';
    bookReveal.innerHTML = `
      <div class="reveal-shape">${itemShape(item)}</div>
      ${itemMetaReveal(item)}
      <p class="reveal-text">${escapeHtml(item.text)}</p>
      <p class="reveal-date">${new Date(item.t).toLocaleDateString()} · ${CAT_LABELS[item.category]||item.category}</p>
      <div class="reveal-actions">
        <button id="bookAnotherBtn">flip again</button>
        <button id="bookBackToGridBtn">back to pages</button>
      </div>`;
    document.getElementById('bookAnotherBtn').onclick = bookRandom;
    document.getElementById('bookBackToGridBtn').onclick = renderBookGrid;
  }
  document.getElementById('bookRandomBtn').addEventListener('click', bookRandom);
  document.getElementById('bookAllBtn').addEventListener('click', renderBookGrid);
  document.getElementById('bookBack').addEventListener('click', ()=> bookView.classList.remove('active'));
  function onThisDayEntries(){
    const today = new Date();
    const md = today.getMonth()+'-'+today.getDate();
    return state.book.filter(item=>{
      const d = new Date(item.t);
      return (d.getMonth()+'-'+d.getDate()) === md && d.getFullYear() !== today.getFullYear();
    });
  }
  function renderOnThisDay(){
    const el = document.getElementById('onThisDay');
    const entries = onThisDayEntries();
    if(!entries.length){ el.innerHTML=''; return; }
    el.innerHTML = '<div class="on-this-day"><p class="on-this-day-title">on this day</p><div class="page-grid">' +
      entries.map(item=>{
        const yearsAgo = new Date().getFullYear() - new Date(item.t).getFullYear();
        return `<div class="note-card"><div class="note-shape">${itemShape(item)}</div><p class="note-cat">${yearsAgo} year${yearsAgo===1?'':'s'} ago</p>${itemMeta(item)}<p class="note-text">${escapeHtml(item.text)}</p><p class="note-date">${new Date(item.t).toLocaleDateString()}</p></div>`;
      }).join('') + '</div></div>';
  }
  function openBook(){
    bookView.classList.add('active');
    buildBookFilters();
    renderOnThisDay();
    renderBookGrid();
  }

  const lanternView = document.getElementById('lanternView');
  const lanternGrid = document.getElementById('lanternGrid');
  const lanternReveal = document.getElementById('lanternReveal');

  function daysLeft(unlockAt){ return Math.max(0, Math.ceil((unlockAt - Date.now())/86400000)); }

  function showUnlockedItem(item){
    lanternGrid.style.display='none';
    lanternReveal.style.display='flex';
    item.opened = true; saveState(state);
    lanternReveal.innerHTML = `
      <div class="reveal-shape">${lanternSVG(item.color, true)}</div>
      <p class="reveal-text">${escapeHtml(item.text)}</p>
      <p class="reveal-date">written ${new Date(item.t).toLocaleDateString()}, open now</p>
      <div class="unlock-row" id="relockRow">
        <button class="unlock-chip" data-days="7">1 week</button>
        <button class="unlock-chip" data-days="30">1 month</button>
        <button class="unlock-chip" data-days="182">6 months</button>
        <button class="unlock-chip" data-days="365">1 year</button>
        <div class="unlock-date-group">
          <span class="unlock-date-label">or pick an exact date</span>
          <input type="date" class="unlock-date" id="relockDate">
          <span class="unlock-date-readout" id="relockDateReadout"></span>
        </div>
      </div>
      <div class="reveal-actions">
        <button id="lockAgainBtn">lock this again</button>
        <button id="keepOpenBtn">keep it open</button>
      </div>`;
    const relockRow = document.getElementById('relockRow');
    const relockDate = document.getElementById('relockDate');
    let relockDays = null;
    let pickingRelock = false;
    relockRow.querySelectorAll('.unlock-chip').forEach(chip=>{
      chip.addEventListener('click', ()=>{
        relockRow.querySelectorAll('.unlock-chip').forEach(c=>c.classList.remove('active'));
        chip.classList.add('active');
        relockDays = parseInt(chip.dataset.days,10);
        relockDate.value='';
        confirmRelock();
      });
    });
    relockDate.addEventListener('change', ()=>{
      relockRow.querySelectorAll('.unlock-chip').forEach(c=>c.classList.remove('active'));
      relockDays = null;
      confirmRelock();
    });
    function confirmRelock(){
      let unlockAt;
      if(relockDate.value){ unlockAt = new Date(relockDate.value+'T00:00:00').getTime(); }
      else if(relockDays){ unlockAt = Date.now() + relockDays*86400000; }
      else return;
      item.unlockAt = unlockAt;
      item.opened = false;
      saveState(state);
      showToast('locked away again until '+new Date(unlockAt).toLocaleDateString()+'.',2800);
      renderLanterns();
    }
    document.getElementById('lockAgainBtn').onclick = ()=>{
      pickingRelock = true;
      relockRow.classList.add('active');
    };
    document.getElementById('keepOpenBtn').onclick = renderLanterns;
  }

  function showLockedItem(item){
    lanternGrid.style.display='none';
    lanternReveal.style.display='flex';
    lanternReveal.innerHTML = `
      <div class="reveal-shape">${lanternSVG(item.color, false)}</div>
      <p class="reveal-text" style="font-style:normal; font-size:15px;">still locked. ${daysLeft(item.unlockAt)} days left.</p>
      <div class="reveal-actions">
        <button id="unlockNowBtn">unlock it now</button>
        <button id="keepLockedBtn">keep it locked</button>
      </div>`;
    document.getElementById('unlockNowBtn').onclick = ()=>{
      item.unlockAt = Date.now();
      saveState(state);
      showUnlockedItem(item);
    };
    document.getElementById('keepLockedBtn').onclick = renderLanterns;
  }

  function renderLanterns(){
    lanternReveal.style.display='none';
    lanternGrid.style.display='flex';
    if(!state.lanterns.length){ lanternGrid.innerHTML='<p class="empty-note">nothing in the safe yet, lock one away from "a message to future you".</p>'; return; }
    lanternGrid.innerHTML='';
    state.lanterns.slice().reverse().forEach((item)=>{
      const unlocked = Date.now() >= item.unlockAt;
      const el = document.createElement('div');
      el.className='lantern-item';
      el.innerHTML = `<div class="shape-wrap">${lanternSVG(item.color, unlocked)}</div><div class="lantern-label">${unlocked ? new Date(item.t).toLocaleDateString() : daysLeft(item.unlockAt)+' days left'}</div>`;
      el.addEventListener('click', ()=>{
        if(unlocked) showUnlockedItem(item);
        else showLockedItem(item);
      });
      lanternGrid.appendChild(el);
    });
  }
  document.getElementById('lanternBack').addEventListener('click', ()=> lanternView.classList.remove('active'));
  function openLanterns(){
    lanternView.classList.add('active');
    renderLanterns();
  }

  function cursorDataUri(color){
    const svg = `<svg xmlns='http://www.w3.org/2000/svg' width='26' height='26' viewBox='0 0 26 26'><path d='M13 2 L15.8 9.8 L24 9.8 L17.3 14.6 L19.8 22.4 L13 17.4 L6.2 22.4 L8.7 14.6 L2 9.8 L10.2 9.8 Z' fill='${color}' stroke='%232A241C' stroke-width='1.4' stroke-linejoin='round'/></svg>`;
    const encoded = svg.replace(/#/g, '%23');
    return `url("data:image/svg+xml,${encoded}") 13 13, auto`;
  }
  function applyThemeIndex(i){
    const t = THEME_LIST[i];
    const root = document.documentElement.style;
    root.setProperty('--bg', t.bg);
    root.setProperty('--ink', t.ink);
    root.setProperty('--ink-soft', hexToRgba(t.ink, 0.65));
    root.setProperty('--card', t.card);
    root.setProperty('--card-border', hexToRgba(t.ink, t.dark ? 0.32 : 0.28));
    root.setProperty('--shadow', t.dark ? 'rgba(0,0,0,0.48)' : hexToRgba(t.ink, 0.32));
    root.setProperty('--accent1', t.accents[0]);
    root.setProperty('--accent2', t.accents[1]);
    root.setProperty('--accent3', t.accents[2]);
    root.setProperty('--accent4', t.accents[3]);
    root.setProperty('--app-cursor', cursorDataUri(t.accents[0]));
    themeToggle.textContent = t.dark ? '☾' : '☀';
    themeToggle.title = t.name;
    state.themeIndex = i;
    saveState(state);
    recolorFallingStars();
  }
  themeToggle.addEventListener('click', ()=>{
    applyThemeIndex((state.themeIndex + 1) % THEME_LIST.length);
  });

  mailBtn.addEventListener('click', ()=>{
    showToast('email sign-in is on the way. for now, everything stays saved in this browser.', 3600);
  });

  applyThemeIndex(state.themeIndex);
  buildPills();
  makeFallingStars();
  applyMode('weighing');
  document.getElementById('dailyQuote').textContent = quoteForToday();
})();
</script>
</body>
</html>
